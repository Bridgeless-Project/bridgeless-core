syntax = "proto3";
package core.swap;

import "swap/models/transaction.proto";

// this line is used by starport scaffolding # proto/tx/import

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/swap/types";

// Msg defines the Msg service.
service Msg {
  rpc SubmitSwapTx(MsgSubmitSwapTx) returns (MsgSubmitSwapTxResponse);
  // this line is used by starport scaffolding # proto/tx/rpc
}

message MsgSubmitSwapTx {
  string creator = 1;
  SwapTransaction tx = 2;
}

message MsgSubmitSwapTxResponse {}


