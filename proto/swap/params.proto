syntax = "proto3";
package core.swap;

import "gogoproto/gogo.proto";

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/swap/types";

// Params defines the parameters for the module.
message Params {
  string module_admin = 1;
  string wrapped_bridge = 3;
  string swapper_address = 4;
  uint64 swap_deadline_seconds = 5;
  reserved 2;
  reserved "uniswap_router_address";
}
