syntax = "proto3";
package core.swap;

import "gogoproto/gogo.proto";

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/swap/types";

// Params defines the parameters for the module.
message Params {
  string module_admin = 1;
  string wrapped_bridge = 2;
  string swapper_address = 3;
  uint64 swap_deadline_seconds = 4;
  string swapper_caller_address = 5; // evm address
}
