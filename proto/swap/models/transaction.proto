syntax = "proto3";
package core.swap;

import "google/protobuf/any.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "bridge/models/transaction.proto";

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/swap/types";

message SwapTransaction {
  core.bridge.Transaction tx = 1 [(gogoproto.nullable) = false]; // Base transaction from bridge module
  string final_receiver = 2; // in case of native swap the final receiver is the end user
  string final_amount = 3; // amount of swapped tokens
  string amount_out_min = 4; // minimum acceptable output amount, provided by backend
  string final_deposit_tx_hash = 5;
  string final_token = 6; // token user wanna get after swap (can be on Bridgeless chain or another one)
  string final_chain_id = 7; // chain where user wanna get the final token (can be bridgeless chain or another one)
  uint64 swap_deadline = 8; // timestamp until when the swap is valid, provided by
  string sender = 9; // user who initiated the bridge transaction
}