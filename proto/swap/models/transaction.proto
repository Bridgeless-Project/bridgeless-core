syntax = "proto3";
package core.swap;

import "google/protobuf/any.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "bridge/models/transaction.proto";

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/swap/types";

message SwapTransaction {
  core.bridge.Transaction tx = 1 [(gogoproto.nullable) = false]; // Base transaction from bridge module
  string final_receiver = 20; // in case of native swap the final receiver is the end user
  string final_amount = 21; // amount of swapped tokens
  string final_deposit_tx_hash = 23;
}



