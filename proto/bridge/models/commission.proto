syntax = "proto3";
package core.bridge;


option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/bridge/types";

message Commission {
    uint64 token_id = 1;
    string amount = 2;
}

message CommissionDistributionInfo {
    int64 token_id = 1;
    string amountIn = 2; // amount of collected fee
    string amountOut = 3; // amount of collected fee on the bridge representation
    repeated string path = 4;
}